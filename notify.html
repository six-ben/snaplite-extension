<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SnapLite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:340px;height:140px;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;
  background:#1e293b;color:#f1f5f9;
  display:flex;align-items:center;justify-content:center;
  padding:20px 24px;
}
.wrap{text-align:center}
.icon{font-size:28px;margin-bottom:10px}
.msg{font-size:14px;line-height:1.6;color:#cbd5e1}
.close{
  margin-top:14px;
  background:#334155;color:#e2e8f0;border:none;
  padding:6px 20px;border-radius:6px;font-size:13px;cursor:pointer;
}
.close:hover{background:#475569}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">⚠️</div>
  <div class="msg" id="msg">当前页面受浏览器限制，无法截图</div>
  <button class="close" id="closeBtn">知道了</button>
</div>
<script>
const params = new URLSearchParams(location.search);
const msg = params.get('msg');
if (msg) document.getElementById('msg').textContent = msg;
document.getElementById('closeBtn').addEventListener('click', () => window.close());
setTimeout(() => window.close(), 5000);
</script>
</body>
</html>
