<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapLite</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="brand">
        <span class="logo">✦</span>
        <span class="brand-name">SnapLite</span>
      </div>

      <div class="capture-grid">
        <button class="capture-btn" data-mode="area" data-cmd="capture-area">
          <span class="icon">⬚</span>
          <span class="label">区域截图</span>
          <span class="hint">拖拽框选</span>
          <span class="shortcut" data-cmd="capture-area"></span>
        </button>
        <button class="capture-btn" data-mode="visible" data-cmd="capture-visible">
          <span class="icon">▣</span>
          <span class="label">可视区域</span>
          <span class="hint">当前视口</span>
          <span class="shortcut" data-cmd="capture-visible"></span>
        </button>
        <button class="capture-btn" data-mode="full" data-cmd="capture-full">
          <span class="icon">⊟</span>
          <span class="label">整页截图</span>
          <span class="hint">自动滚动</span>
          <span class="shortcut" data-cmd="capture-full"></span>
        </button>
        <button class="capture-btn" data-mode="dom">
          <span class="icon">◈</span>
          <span class="label">DOM 元素</span>
          <span class="hint">点选节点</span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="nav-row">
        <button id="defaultCapture" class="nav-btn">
          <span>⚡</span> 快速截图
        </button>
        <button id="openHistory" class="nav-btn">
          <span>◷</span> 历史
        </button>
        <button id="openSettings" class="nav-btn">
          <span>⚙</span> 设置
        </button>
      </div>

      <p id="msg" class="msg"></p>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
